
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResourceSpy Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 2rem;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header { margin-bottom: 2rem; border-bottom: 1px solid #334155; padding-bottom: 1rem; }
        h1 { font-size: 1.5rem; margin: 0; color: #38bdf8; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
        .card {
            background: #1e293b;
            padding: 1.5rem;
            border-radius: 0.75rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            border: 1px solid #334155;
        }
        .card h2 { font-size: 1rem; margin-top: 0; color: #94a3b8; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 2rem; }
        .stat-card { background: #1e293b; padding: 1rem; border-radius: 0.5rem; border: 1px solid #334155; text-align: center; }
        .stat-val { font-size: 1.25rem; font-weight: bold; color: #38bdf8; }
        .stat-label { font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>ResourceSpy // System Health Report</h1>
            <p style="color: #64748b; font-size: 0.875rem;">Last Updated: 2026-04-02 06:53:33</p>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-val">9.0%</div>
                <div class="stat-label">CPU Usage</div>
            </div>
            <div class="stat-card">
                <div class="stat-val">5584 MB</div>
                <div class="stat-label">RAM Used</div>
            </div>
            <div class="stat-card">
                <div class="stat-val">214 GB</div>
                <div class="stat-label">Disk Free</div>
            </div>
            <div class="stat-card">
                <div class="stat-val">0.8271484375</div>
                <div class="stat-label">Load (1m)</div>
            </div>
        </div>

        <div class="grid">
            <div class="card">
                <h2>CPU & RAM Trends (%)</h2>
                <canvas id="resourceChart"></canvas>
            </div>
            <div class="card">
                <h2>Network Throughput (MB per check)</h2>
                <canvas id="networkChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        const commonOptions = {
            responsive: true,
            scales: {
                y: { grid: { color: '#334155' }, ticks: { color: '#94a3b8' } },
                x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
            },
            plugins: { legend: { labels: { color: '#f8fafc' } } }
        };

        new Chart(document.getElementById('resourceChart'), {
            type: 'line',
            data: {
                labels: ["06:53"],
                datasets: [
                    { label: 'CPU %', data: [9.0], borderColor: '#ef4444', tension: 0.3, fill: false },
                    { label: 'RAM %', data: [17.59738690033385], borderColor: '#3b82f6', tension: 0.3, fill: false }
                ]
            },
            options: commonOptions
        });

        new Chart(document.getElementById('networkChart'), {
            type: 'line',
            data: {
                labels: ["06:53"],
                datasets: [
                    { label: 'Sent (MB)', data: [0], borderColor: '#10b981', tension: 0.3, fill: false },
                    { label: 'Recv (MB)', data: [0], borderColor: '#8b5cf6', tension: 0.3, fill: false }
                ]
            },
            options: commonOptions
        });
    </script>
</body>
</html>
